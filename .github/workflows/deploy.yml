name: Deploy Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject stakeholder token
        run: |
          TOKEN="${{ secrets.STAKEHOLDER_TOKEN }}"
          node -e "
            const fs = require('fs');
            const token = process.argv[1];
            let html = fs.readFileSync('index.html', 'utf8');
            const before = html.includes('STAKEHOLDER_TOKEN_PLACEHOLDER');
            html = html.replace(/const STAKEHOLDER_TOKEN='[^']*';/g, \"const STAKEHOLDER_TOKEN='\" + token + \"';\");
            fs.writeFileSync('index.html', html);
            console.log('Before had placeholder:', before);
            console.log('Token injected, length:', token.length);
            console.log('Verify:', html.includes(token) ? 'SUCCESS' : 'FAILED');
          " "$TOKEN"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
