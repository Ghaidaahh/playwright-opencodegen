name: Deploy Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject stakeholder token
        run: |
          node -e "
          const fs = require('fs');
          let html = fs.readFileSync('index.html', 'utf8');
          html = html.replace(/const STAKEHOLDER_TOKEN='[^']*';/, \`const STAKEHOLDER_TOKEN='\${process.env.STAKEHOLDER_TOKEN}';\`);
          fs.writeFileSync('index.html', html);
          console.log('Token injected successfully');
          "
        env:
          STAKEHOLDER_TOKEN: ${{ secrets.STAKEHOLDER_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
