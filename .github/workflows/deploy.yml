name: Deploy Dashboard
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate stakeholder data
        run: node scripts/generate-stakeholder-data.js
        env:
          GH_DASHBOARD_TOKEN: ${{ secrets.GH_DASHBOARD_TOKEN }}
          STAKEHOLDER_REPOS: ${{ vars.STAKEHOLDER_REPOS }}
          STAKEHOLDER_WORKFLOW_FILE: ${{ vars.STAKEHOLDER_WORKFLOW_FILE }}
          STAKEHOLDER_WORKFLOW_FILES: ${{ vars.STAKEHOLDER_WORKFLOW_FILES }}
          STAKEHOLDER_WORKFLOW_MAP: ${{ vars.STAKEHOLDER_WORKFLOW_MAP }}
          STAKEHOLDER_DAYS_BACK: ${{ vars.STAKEHOLDER_DAYS_BACK }}
          STAKEHOLDER_RISK_FAILED_RUNS: ${{ vars.STAKEHOLDER_RISK_FAILED_RUNS }}
          STAKEHOLDER_RISK_PASS_RATE: ${{ vars.STAKEHOLDER_RISK_PASS_RATE }}
          STAKEHOLDER_ATTENTION_PASS_RATE: ${{ vars.STAKEHOLDER_ATTENTION_PASS_RATE }}
          STAKEHOLDER_BUILD_RISK_FAILED_RUNS: ${{ vars.STAKEHOLDER_BUILD_RISK_FAILED_RUNS }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
