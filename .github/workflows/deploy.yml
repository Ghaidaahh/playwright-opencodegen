name: Deploy Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stakeholder data
        run: node scripts/generate-stakeholder-data.js
        env:
          GH_DASHBOARD_TOKEN: ${{ secrets.GH_DASHBOARD_TOKEN }}
          STAKEHOLDER_REPOS: ${{ vars.STAKEHOLDER_REPOS }}
          STAKEHOLDER_WORKFLOW_FILE: ${{ vars.STAKEHOLDER_WORKFLOW_FILE }}
          DASHBOARD_SUMMARY_PATH: ${{ vars.DASHBOARD_SUMMARY_PATH }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
